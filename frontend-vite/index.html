<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Veloré" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.svg" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <title>Veloré - Reservá en las mejores peluquerías</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      #install-banner{display:flex;position:fixed;top:0;left:0;right:0;z-index:99999;align-items:center;justify-content:space-between;gap:12px;padding:10px 20px;background:#0c0c0f;border-bottom:1px solid rgba(197,168,128,0.15);font-family:Outfit,sans-serif;font-size:14px;color:#f4f4f5}
      #install-banner.ib-hidden{display:none}
      .ib-text{flex:1}
      .ib-btn{display:inline-flex;align-items:center;padding:8px 20px;border:none;border-radius:8px;background:#c5a880;color:#0a0a0c;font-family:Outfit,sans-serif;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
      .ib-btn:hover{background:#d5be9b}
      .ib-actions{display:flex;align-items:center;gap:8px}
      .ib-close{display:flex;align-items:center;justify-content:center;width:32px;height:32px;padding:0;border:none;border-radius:50%;background:transparent;color:#a1a1aa;font-size:16px;cursor:pointer}
      .ib-close:hover{background:rgba(255,255,255,0.08);color:#f4f4f5}
    </style>
  </head>
  <body class="fade-in">
    <div id="install-banner">
      <span id="ib-text" class="ib-text">📲 Instalá Veloré en tu celular para una experiencia más rápida</span>
      <div class="ib-actions">
        <button id="ib-btn" class="ib-btn" style="display:none">Instalar app</button>
        <button id="ib-close" class="ib-close" aria-label="Cerrar">✕</button>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      try {
        (function() {
          var b = document.getElementById('install-banner');
          var t = document.getElementById('ib-text');
          var btn = document.getElementById('ib-btn');
          var cls = document.getElementById('ib-close');
          var pe = null;

          if (!b||!t||!cls) return;

          function hide() { b.classList.add('ib-hidden'); }

          if (window.matchMedia('(display-mode: standalone)').matches||window.matchMedia('(display-mode: fullscreen)').matches||window.navigator.standalone===true) { hide(); return; }

          var ss;
          try { ss = sessionStorage; } catch(e) { ss = null; }
          if (ss && ss.getItem('ib')==='1') { hide(); return; }

          window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            pe = e;
            t.textContent = '📲 Instalá Veloré para una experiencia más rápida';
            if (btn) { btn.style.display = ''; }
            b.classList.remove('ib-hidden');
          }, { once: true });

          if (/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream) {
            t.textContent = '📲 Instalá la app en tu iPhone: tocá Compartir ⎋ y luego "Agregar a pantalla de inicio"';
            if (btn) btn.style.display = 'none';
            b.classList.remove('ib-hidden');
          }

          if (cls) {
            cls.onclick = function() {
              if (ss) try { ss.setItem('ib', '1'); } catch(e) {}
              hide();
            };
          }

          if (btn) {
            btn.onclick = function() {
              if (!pe) return;
              pe.prompt();
              pe.userChoice.then(function(r) {
                if (r.outcome==='accepted') hide();
              });
            };
          }
        })();
      } catch(e) { console.error('ib:', e); }
    </script>
  </body>
</html>
