<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Nueva Contraseña</title>
    <style>
        /* Estilos inline para evitar problemas de carga */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
        }

        .back-link a:hover {
            color: #667eea;
        }

        .password-requirements {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Nueva Contraseña</h1>
        <p class="subtitle" id="pageSubtitle">Ingresá tu nueva contraseña</p>

        <div class="message error" id="errorMsg"></div>
        <div class="message success" id="successMsg"></div>

        <!-- Formulario de nueva contraseña -->
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="newPassword">Nueva contraseña</label>
                <input type="password" id="newPassword" required minlength="6" placeholder="Mínimo 6 caracteres">
                <div class="password-requirements">• Mínimo 6 caracteres</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" required minlength="6" placeholder="Repetí tu contraseña">
            </div>
            <button type="submit" class="btn" id="submitBtn">Actualizar contraseña</button>
        </form>

        <!-- Mensaje de éxito -->
        <div id="successState" style="display: none; text-align: center;">
            <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
            <p style="color: #166534; margin-bottom: 24px;">¡Tu contraseña fue actualizada!</p>
            <a href="login.html" class="btn" style="display: inline-block; text-decoration: none;">Iniciar sesión
                ahora</a>
        </div>

        <!-- Estado de carga -->
        <div id="loadingState" style="display: none; text-align: center; padding: 20px;">
            <div class="spinner" style="border-top-color: #667eea; margin: 0 auto 16px;"></div>
            <p style="color: #64748b;">Procesando...</p>
        </div>

        <div class="back-link">
            <a href="login.html">← Volver al inicio de sesión</a>
        </div>
    </div>

    <script src="../js/auth/reset-password.js"></script>
</body>

</html>
