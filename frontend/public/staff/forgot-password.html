<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Recuperar Contraseña</title>
    <link rel="stylesheet" href="../css/global-premium.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #10b981;
        }

        .success.show {
            display: block;
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ef4444;
        }

        .error.show {
            display: block;
        }

        .back-link {
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary-hover);
        }
    </style>
</head>

<body class="fade-in">
    <div class="container glass-panel">
        <h1 class="text-gradient">🔐 Recuperar Contraseña</h1>
        <p class="subtitle">Te enviaremos un enlace para restablecer tu contraseña</p>

        <div class="success" id="successMsg"></div>
        <div class="error" id="errorMsg"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Email registrado</label>
                <input type="email" id="email" class="glass-input" required placeholder="admin@pelu.com">
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary"
                style="width: 100%; padding: 14px; margin-top: 10px;">Enviar enlace</button>
        </form>

        <div class="back-link">
            <a href="login.html">← Volver al inicio de sesión</a>
        </div>
    </div>

    <script src="../js/auth/forgot-password.js"></script>
</body>

</html>
