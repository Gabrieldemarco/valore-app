<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👨‍🦱 Acceso Peluqueros</title>
  <link rel="stylesheet" href="../css/global-premium.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-bottom: 8px;
      font-size: 28px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid #ef4444;
    }

    .error.show {
      display: block;
    }

    .back-link {
      margin-top: 20px;
      font-size: 14px;
    }

    .back-link a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--primary-hover);
    }

    .forgot-link {
      margin-top: 12px;
      font-size: 13px;
    }

    .forgot-link a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link a:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }
  </style>
</head>

<body class="fade-in">
  <div class="container glass-panel">
    <h1 class="text-gradient">👨‍🦱 Acceso Peluqueros</h1>
    <p class="subtitle">Ingresá para gestionar turnos</p>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="glass-input" required placeholder="admin@pelu.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" class="glass-input" required placeholder="••••••••">
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary"
        style="width: 100%; padding: 14px; margin-top: 10px;">Ingresar</button>

      <!-- 🔥 ENLACE A RECUPERAR CONTRASEÑA (NUEVO) -->
      <div class="forgot-link">
        <a href="forgot-password.html">¿Olvidaste tu contraseña?</a>
      </div>

      <div style="text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted);">
        ¿No tenés cuenta? <a href="register.html" style="color: var(--primary-hover); text-decoration: none;">Registrate
          gratis</a>
      </div>
    </form>

    <div class="back-link">
      <a href="../index.html">← Volver a reservar turno</a>
    </div>
  </div>

  <script src="../js/auth/login.js"></script>
</body>

</html>
