name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:orion1@localhost:5432/agenda_app_test
  TEST_DATABASE_URL: postgresql://postgres:orion1@localhost:5432/agenda_app_test
  JWT_SECRET: test-secret-ci
  NODE_ENV: test

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: orion1
          POSTGRES_DB: agenda_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit & integration tests
        run: npm test && npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vite

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json

      - run: npm ci
        working-directory: frontend-vite

      - run: npm run build
        working-directory: frontend-vite

      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          SOURCE: .
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: -avz --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='backend/tests' --exclude='frontend-vite/node_modules' --exclude='frontend-vite/src'
          SCRIPT_BEFORE_REQUIRED: true
          SCRIPT_BEFORE: |
            whoami
            echo "Starting deploy to ${{ secrets.DEPLOY_PATH }}"
          SCRIPT_AFTER: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose down
            docker compose up -d --build
            echo "Deploy complete"
