name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agenda_test
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agenda_restore_test
  RESTORE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agenda_restore_test
  JWT_SECRET: test-secret-ci
  NODE_ENV: test

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: TypeScript type check
        working-directory: backend
        run: npm run typecheck

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Security audit
        continue-on-error: true
        working-directory: backend
        run: npm run audit

      - name: Check env (backend)
        working-directory: backend
        run: NODE_ENV=test npm run check-env

      - name: Run backend migrations (only on main)
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: npm run migrate

      - name: Run backend tests (Jest)
        working-directory: backend
        run: npm test

      - name: Start backend server for smoke
        working-directory: backend
        run: |
          NODE_ENV=development PORT=3000 npm start &
          for i in {1..30}; do
            if curl -sS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "server up"; break
            fi
            sleep 1
          done

      - name: Run smoke tests
        working-directory: backend
        run: npm run smoke

  backup-restore:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run DB backup
        working-directory: backend
        run: npm run backup

      - name: Run DB restore test
        working-directory: backend
        run: npm run restore-test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  deploy:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [backend, frontend, backup-restore]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend-vite/package-lock.json
      - run: npm ci
        working-directory: frontend-vite
      - run: npm run build
        working-directory: frontend-vite
      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          SOURCE: .
          TARGET: ${{ secrets.DEPLOY_PATH }}
          ARGS: -avz --delete --exclude='node_modules' --exclude='.git' --exclude='.env' --exclude='backend/tests' --exclude='frontend-vite/node_modules' --exclude='frontend-vite/src'
          SCRIPT_BEFORE_REQUIRED: true
          SCRIPT_BEFORE: |
            whoami
            echo "Starting deploy to ${{ secrets.DEPLOY_PATH }}"
          SCRIPT_AFTER: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose down
            docker compose up -d --build
            echo "Deploy complete"

  notify:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Notify Slack on failure
        if: failure()
        run: |
          payload=$(jq -n --arg text "CI failed for ${GITHUB_REPOSITORY} on ${GITHUB_REF}: run #${GITHUB_RUN_NUMBER} (${GITHUB_EVENT_NAME})" '{text:$text}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" ${{ secrets.SLACK_WEBHOOK }}
      - name: Notify Slack on success
        if: success()
        run: |
          payload=$(jq -n --arg text "CI succeeded for ${GITHUB_REPOSITORY} on ${GITHUB_REF}: run #${GITHUB_RUN_NUMBER}" '{text:$text}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" ${{ secrets.SLACK_WEBHOOK }}
      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI failed: ${{ github.repository }} (${{ github.ref }})"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: ${{ secrets.NOTIFY_EMAIL_FROM }}
          body: |
            CI run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Status: failed
